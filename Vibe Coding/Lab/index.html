<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickSort Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>QuickSort Sorter</h1>
        <p class="subtitle">Enter numbers separated by commas and click sort to see the magic!</p>
        <textarea id="input" placeholder="e.g., 64, 34, 25, 12, 22, 11, 90"></textarea>
        <button id="sortBtn">Sort Array</button>
        <div id="result" class="result-card"></div>
    </div>
    <script src="index.js"></script>
</body>

</html>
